spring:

  application:
    name: book-store

  datasource:
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/book-store?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

  data:
    redis:
      port: ${SPRING_DATA_REDIS_PORT:6379}
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 25

  liquibase:
    change-log: classpath:/db/changelog/appchange-log.xml
    liquibase-schema: ${SPRING_LIQUIBASE_SCHEMA:book-store}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/book-store}
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

server:
  port: 8080

cloudinary:
  api_key: ${CLOUDINARY_API_KEY:}
  api_secret: ${CLOUDINARY_API_SECRET:}
  cloud_name: ${CLOUDINARY_CLOUD_NAME:}

jwt:
  secret: ${JWT_SECRET:ZGV2ZWxvcG1lbnQtb25seS1qd3Qtc2VjcmV0LWNoYW5nZS1tZQ==}

frontend:
  url: ${FRONTEND_URL:http://localhost:5187}
  oauth2-callback-url: ${FRONTEND_OAUTH2_CALLBACK_URL:http://localhost/oauth2/callback}

vnpay:
  tmnCode: ${VNPAY_TMN_CODE:DEMO}
  hashSecret: ${VNPAY_HASH_SECRET:DEMOSECRETKEY}
  payUrl: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  returnUrl: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/user/vnpay/callback}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
